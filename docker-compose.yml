services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8020:8020"
    volumes:
      - /tmp/yolov-uploads:/tmp/yolov-uploads
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "9020:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
