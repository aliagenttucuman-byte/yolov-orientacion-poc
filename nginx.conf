server {
    listen 80;
    client_max_body_size 500m;

    # API → backend
    location /api/ {
        proxy_pass         http://backend:8020;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Frontend → React app
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
